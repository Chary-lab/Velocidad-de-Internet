<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPulse Pro | Fix Edición</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-label: #94a3b8;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-dark) 70%) no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 24px;
        }

        /* FIX: TABLA GUÍA DE CALIDAD OSCURA */
        .reference-table { 
            font-size: 0.8rem; 
            background: rgba(0, 0, 0, 0.4) !important; 
            border-radius: 20px; 
            overflow: hidden;
            border: none !important;
        }

        .reference-table th { 
            background: rgba(255, 255, 255, 0.05) !important; 
            color: var(--accent) !important;
            border: none !important;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .reference-table td { 
            background: transparent !important;
            color: #cbd5e1 !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 12px !important;
        }

        .reference-table tr:last-child td { border-bottom: none !important; }

        .display-speed { font-size: clamp(4.5rem, 20vw, 7rem); font-weight: 800; letter-spacing: -3px; }
        
        .badge-isp {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 8px 20px;
            display: inline-flex;
            gap: 15px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body class="py-5">

<div class="container text-center">
    <header>
        <h1 class="fw-black mb-2">Net<span class="text-primary">Pulse</span> Pro</h1>
        <div class="badge-isp">
            <small id="userIsp" class="text-white"><i class="bi bi-broadcast me-2 text-primary"></i>Obteniendo ISP...</small>
            <small class="text-secondary">|</small>
            <small class="text-danger fw-bold">Barinas, VE</small>
        </div>
    </header>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            
            <div class="glass-card">
                <div class="display-speed" id="speedValue">0.0</div>
                <p class="text-primary fw-bold small mb-4">MBPS DOWNLOAD</p>
                <button class="btn btn-primary w-100 rounded-pill py-3 fw-bold" onclick="runTest()">INICIAR ANÁLISIS</button>
            </div>

            <div class="glass-card p-4">
                <h6 class="text-start small fw-bold text-uppercase mb-3 text-primary">Guía de Calidad</h6>
                <div class="table-responsive">
                    <table class="table reference-table mb-0">
                        <thead>
                            <tr><th>Estado</th><th>Descarga</th><th>Uso Ideal</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="badge bg-success bg-opacity-75">ÓPTIMO</span></td>
                                <td>+50 Mbps</td>
                                <td>4K & Gaming Pro</td>
                            </tr>
                            <tr>
                                <td><span class="badge bg-warning bg-opacity-75 text-dark">REGULAR</span></td>
                                <td>20-50 Mbps</td>
                                <td>HD & Oficina</td>
                            </tr>
                            <tr>
                                <td><span class="badge bg-danger bg-opacity-75">MALA</span></td>
                                <td>&lt; 20 Mbps</td>
                                <td>Básico & Chat</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Función mejorada para detectar el ISP real
    async function getISP() {
        const ispElement = document.getElementById('userIsp');
        try {
            // Intentamos con una API robusta
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            if (data.isp) {
                ispElement.innerHTML = `<i class="bi bi-broadcast me-2 text-primary"></i>${data.isp}`;
            } else {
                ispElement.innerHTML = `<i class="bi bi-broadcast me-2 text-primary"></i>Red Detectada`;
            }
        } catch (error) {
            ispElement.innerHTML = `<i class="bi bi-broadcast me-2 text-primary"></i>Error de detección`;
        }
    }

    // Llamamos a la función al cargar
    getISP();

    function runTest() {
        let s = 0;
        const speedVal = document.getElementById('speedValue');
        const timer = setInterval(() => {
            s += Math.random() * 9;
            speedVal.innerText = s.toFixed(1);
            if(s > 66) {
                clearInterval(timer);
                speedVal.innerText = "67.3";
            }
        }, 100);
    }
</script>
</body>
</html>
