<script>
// Código para gestión de historial de resultados en LocalStorage
const resultsHistory = JSON.parse(localStorage.getItem('resultsHistory')) || [];

function saveResult(result) {
    resultsHistory.push(result);
    localStorage.setItem('resultsHistory', JSON.stringify(resultsHistory));
}

function displayResultsHistory() {
    const historyContainer = document.getElementById('results-history');
    historyContainer.innerHTML = '';
    resultsHistory.forEach(result => {
        const resultElement = document.createElement('div');
        resultElement.innerText = result;
        historyContainer.appendChild(resultElement);
    });
}

// Integración con Chart.js para visualización
let chart;
function renderChart(data) {
    const ctx = document.getElementById('results-chart').getContext('2d');
    if (chart) {
        chart.destroy();
    }
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                label: 'Resultados',
                data: data.values,
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

// Interfaz adaptable y modo oscuro
const toggleDarkMode = () => {
    document.body.classList.toggle('dark-mode');
};

// Selector de idioma
let currentLanguage = 'en';
const changeLanguage = (language) => {
    currentLanguage = language;
    /* Lógica para traducir la interfaz */
};

// Botón para copiar resultado
const copyResult = (result) => {
    navigator.clipboard.writeText(result);
    alert('Resultado copiado: ' + result);
};

// Mensaje de privacidad
document.getElementById('privacy-message').innerText = 'Respetamos tu privacidad. Los resultados se almacenan localmente.';

// Lógica de pérdida de paquetes
function calculatePacketLoss(sent, received) {
    return ((sent - received) / sent) * 100;
}

</script>
